  description:
    value: >-
      <p>This Quarterstaff is made from a knotted tree branch that has been
      shaved of its bark. Bite marks apparently from some canine creature line
      the staff. The wood is beginning to take a maroon hue. A short shard of
      ivory is protruding from the side near one end.</p><p><em><strong>Scent of
      Blood.</strong></em> Any bloodied creature you hit with the weapon takes
      an extra 1d4 necrotic damage.</p><p><em><strong>Pack
      Advantage.</strong></em> You cannot have disadvantage on attacks made with
      this weapon against a creature if at least one of your allies is within 5
      feet of the target.</p>
