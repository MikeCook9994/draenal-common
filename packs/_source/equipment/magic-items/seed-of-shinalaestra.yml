  description:
    value: >-
      <p><em>Wondrous Item, Uncommon (Requires Attunement by a
      Druid)</em></p><p>This grapefruit-sized seed, fallen from the boughs of
      the very tree you called home, emenates a subtle magical aura that yearns
      to be nurtured. The seed counts as a Druidic Focus for you and you gain a
      +1 bonus to ability checks and saving throws.</p><p>Additionally, the seed
      can be used to satsify a costly material component of any Druid spell with
      a gp value of up to 25 times your Druid level (currently
      [[@classes.druid.levels * 25]]gp). The seed is not consumed if the spell's
      material components normally would be. Once this property is used, it
      can't be used again until the next dawn.</p><section
      id="secret-nh2ZHIcUKEYwoYE9" class="secret"><p><strong>Foundry
      Note</strong></p><p>This item includes an Active Effect that automates the
      bonus.</p></section>
