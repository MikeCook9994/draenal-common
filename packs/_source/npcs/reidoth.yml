          you can give yourself one use by expending a spell slot (no action
          required).</p><p>In addition, you can expend one use of Wild Shape (no
          action required) to give yourself a level 1 spell slot, but you can't
          do so again until you finish a Long Rest.</p><section class="secret"
          id="secret-b0eq9t1Lkei4tN53"><p><strong>Foundry
