          Make a ranged spell attack against the target. On a hit, the target
          takes 1d8 Radiant damage, and until the end of your next turn, it
          emits Dim Light in a 10-foot radius and can't benefit from the
          &amp;Reference[Invisible] condition.</p><p><strong>Cantrip
