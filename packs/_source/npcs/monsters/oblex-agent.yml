      description:
        value: >-
          <p>The oblex extrudes a piece of itself that assumes the appearance of
          one Medium or smaller creature that it has stolen a proficiency from.
          This impersonation appears, feels, and sounds exactly like the
          creature it impersonates, though it smells faintly of sulfur. The
          oblex can impersonate 2 different creatures, each one tethered to its
          body by a strand of slime that can extend up to 60 feet away. The
          tether is immune to damage, but it is severed if there is no opening
          at least 1 inch wide between the oblex and the simulacrum. The
          simulacrum disappears if the tether is severed. The simulacrum is an
          extension of the oblex, meaning that the oblex occupies its space and
          the simulacrum's space simultaneously.</p>
        chat: ''
