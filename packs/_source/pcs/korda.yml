      description:
        value: >-
          <div class="ddb"><h1>Background:
          Time-Lost</h1><p></p><p><strong>Ability Scores:</strong> Strength,
          Constitution, Wisdom<br><strong>Feat:</strong> Tough<br><strong>Skill
          Proficiencies:</strong> &amp;Reference[ath]{Athletics} and
          &amp;Reference[prc]{Perception}<br><strong>Tool Proficiency:</strong>
          <em>Choose one kind of Artisan's
          Tools</em><br><strong>Equipment:</strong> <em>Choose A or B:</em> (A)
          Artisan's Tools (same as above), 2 Pouches, Traveler's Clothes, 32 GP;
          or (B) 50 GP</p><p>By some magical means, you were frozen in time
          during a time long past. The world you knew has passed and modernity
          has been thrust upon you. While the knowledge you carry has been
          replaced by the marvel of invention, the wisdom you keep is timeless.
          With head held high and the strength of the ages at your back, you've
          bravely taken your steps into this new world, beckoning the thrill of
          a new adventure.</p><h2>Feat: Tough</h2></div>
