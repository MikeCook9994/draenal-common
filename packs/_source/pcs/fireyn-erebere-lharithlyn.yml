  - _id: ZwMkYoWu2bW2dzO1
    name: Druidic
    type: feat
    folder: EXYmwRGoNyMbByN1
    img: icons/commodities/treasure/token-runed-circle-green.webp
    system:
      description:
        value: >-
          <p>You know Druidic, the secret language of Druids. While learning
          this ancient tongue, you also unlocked the magic of communicating with
          animals; you always have the
          @UUID[Compendium.dnd5e.spells24.Item.phbsplSpeakwithA]{Speak with
          Animals} spell prepared.</p><p>You can use Druidic to leave hidden
          messages. You and others who know Druidic automatically spot such a
          message. Others spot the message's presence with a successful [[/check
          inv 15]] check but can't decipher it without magic.</p><section
          class="secret" id="secret-5uD3Qi61JX7q2Fk8"><p><strong>Foundry
          Note</strong></p><p>Druidic and Speak with Animals are automatically
          added during advancement.</p></section>
