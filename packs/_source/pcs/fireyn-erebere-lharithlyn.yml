  details:
    biography:
      value: >-
        <p>Born in the Fading City of Shinaelestra in the Feywild,
        Fi'Reyn'Erebere Lharithlyn is the once younger and now elder brother to
        his sister Vaelwyn. The two of them find themselves on the Prime
        Material Plane after an extraordinary series of events which have forced
        them to leave their home for a time. Without knowing much about this new
        place at all, the two of them find themselves forced to carve out a
        strange day-to-day existence. After a short time he finds himself in
        Neverwinter knowing that civilization may provide answers, or a
        distraction.</p>
      public: ''
    alignment: Neutral Good
    ideal: >-
      • As someone new to these strange lands, I am cautious and respectful in
      my dealings.

      • I must be careful, for I have no way of telling friend from foe here.
    bond: >-
      • I believe my destiny is entwined with my twin sister's. I would vie my
      life for her. So long as I have her, I can face any adversity.

      • Though I had no choice, I lament having to leave my home. I hope to see
      it again one day.
    flaw: >-
      • In an unfamiliar environment I am quick to despair.

      • I am immediately frustrated by those that throw themselves into danger
      without thinking of the consequences first.

      • My loyalty to my family will often distract me in a stressful situation.

      Where other elves can temper their wild impulses, Eladrin are creatures
      ruled by emotion.
