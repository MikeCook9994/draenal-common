        value: >-
          <div class="ddb"><h1>Background:
          Rewarded</h1><p></p><p><strong>Ability Scores:</strong> Intelligence,
          Wisdom, Charisma<br><strong>Feat:</strong> Skilled<br><strong>Skill
          Proficiencies:</strong> &amp;Reference[ath]{Insight} and
          &amp;Reference[prc]{Persuasion}<br><strong>Tool Proficiency:</strong>
