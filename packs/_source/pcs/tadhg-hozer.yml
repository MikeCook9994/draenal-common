          Parchment (5 sheets), a gaming set (same as above), a signet ring,
          Fine Clothes, a Pouch, 18 gp; or (B) 50 GP</p><p>You were living a
          difficult life before your destiny suddenly changed through a
          miraculous turn of good fortune. Perhaps a benevolent deity gave you
          precisely what you most desired. You might have stumbled across a Deck
          of Many Things and drawn a card with a potent, positive effect. Or
