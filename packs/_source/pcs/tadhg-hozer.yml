  - name: Hex
    system:
      description:
        value: >-
          <p>You place a curse on a creature that you can see within range.
          Until the spell ends, you deal an extra 1d6 Necrotic damage to the
          target whenever you hit it with an attack roll. Also, choose one
          ability when you cast the spell. The target has Disadvantage on
          ability checks made with the chosen ability.</p><p>If the target drops
          to 0 Hit Points before this spell ends, you can take a Bonus Action on
          a later turn to curse a new creature.</p><p><strong>Using a
          Higher-Level Spell Slot.</strong> Your Concentration can last longer
          with a spell slot of level 2 (up to 4 hours), 3–4 (up to 8 hours), or
          5+ (24 hours).</p>
