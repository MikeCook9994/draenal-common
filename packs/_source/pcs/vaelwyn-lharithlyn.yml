      description:
        value: >-
          <p>Druids of most other circles find purpose in shepparding and
          sheltering living beasts and creatures alike. They guide them to where
          they seek and provide them healing in times of need. Yet, these other
          druid circles also recognize the importance of preserving the natural
          balance. What lives must eventually die, so life can be born anew.
          However, there are those that pervert this cycle by toying with life
          before or beyond its time is up. Druids of the Circle of Nightmares
          carry the heavy burden of balancing the scales against these
          perversions. You are the darkness, for without it, light would have no
          purpose.</p>
