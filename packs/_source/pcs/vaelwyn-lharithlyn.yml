  details:
    biography:
      value: >-
        <p>Druid Proficiencies: Martial Weapons, Medium Armor, Herbalism Kit,
        Shields<br>Background (Guide) Proficiencies: Cartographer's
        Tools<br>Eladrin Proficiencies: Alchemist's Supplies, Poisoner's Kit
        (can change on long rest)</p><p></p><h4>Notes:</h4><p>From Shinaelestra
        in the Feywild: Heroes of the Feywild page
        11</p><blockquote><p>Shinaelestra, the Fading City, is a city located in
        the Feywild. The city is overrun by nature, as its inhabitants have
        allowed it to be reclaimed. The Fading city is mostly inhabited by more
        nature-focused fey, rangers, and druids due to this. The city is ruled
        by the eladrin ranger Lord Calenon Thray, who some claim to be the
        greatest ranger to ever live. He has been known to train mortal rangers
        who successfully navigate their way to the city. Much like the city of
        Astrazalian, Shinaelestra performs a worldfall - twice day, rather than
        twice a year. During the "day", it exists in the Feywild, occasionally
        coming under attack by the fomorians of Queen Connomae. At night, it
        worldfalls to the material plane. While the specific location it appears
        in always changes, it is always within a deep, dangerous forest that the
        locals of the city refer to as the Howling Forest. The city then comes
        under attack by the creatures of these forests until morning, when the
        city worldfalls back to the Feywild.</p></blockquote><p>Volo (I
        think):</p><blockquote><p>"Because of the rarity of elf births, siblings
        might be separated in age by decades, or even a century or more. Thus,
        few elves grow up playing with brothers or sisters of similar age and
        instead rely on friends for the development of their social skills. In
        exceedingly rare cases, a birth might produce twins or — scarcer yet —
        triplets. These offspring, which the elves refer to as soul siblings,
        are believed to have a special, intertwined destiny that can be
        fulfilled only if they are raised together. Elf legends are filled with
        tales of misfortune and tragedy that comes to pass when twins are
        separated and kept too long apart. One might be compelled to reunite
        with the other, at risk of life and limb; identical twins could become
        entangled in a case of mistaken identity; or the siblings might grow up
        as opposites, each determined to seek out and defeat the
        other."</p></blockquote><p>Any mortal that witnessed the passing of the
        Wild Hunt and failed to resist against its magical aura would be
        compelled to join it.</p><p>Those under this effect followed the Wild
        Hunt wherever it went, considering the Master of the Hunt to be their
        master. This meant even acting against their own alignment at his
        behest, fighting those they would otherwise ignore or never
        fight.</p><p>Those abducted by the Wild Hunt stopped aging until they
        left it. But once freed they had gaps in their memories, finding
        themselves in unexpected areas when they came to and rarely recalling
        more than a few details of Cerunnos's appearance. They were also liable
        to be haunted with nightmares of the Hunt, could suffer from madness,
        and were more likely to be entranced if they ever witnessed the Wild
        Hunt again.</p><p></p>
      public: ''
    alignment: Chaotic Neutral
    ideal: >-
      Adventure! I'm far from home and everything is strange and wonderful.

      I believe sentient creatures and their civilizations to be a part of the
      natural order and not outside it, and have seen the struggle for that
      balance play out all my life.
    bond: >-
      I'm fascinated by the beauty and wonder of this new land.

      I believe my destiny is intwined with my twin brother's. I would give my
      life for him. So long as I have him, I can face any adversity.

      I am likely to be re-entranced by the Wild Hunt if I ever witness it
      again. Nightmares of it invade my reverie.
    flaw: >-
      I'm a little too hungry to experience everything life has to offer.

      I can get lost in my own thoughts and contemplation, becoming oblivious to
      my surroundings. 

      I pretend not to understand the local language in order to avoid
      interactions I would rather not have. 

      I'm eager to distract myself from my fear and nightmares with everything
      the Prime Material has to offer. That could provide a weakness for the new
      intoxicants, exotic beauty, and other pleasures of this land. 

      I'm prone to becoming bitter, pensive, and gloomy when distressed. 

      Where other elves can temper their wild impulses, eladrin are creatures
      ruled by emotion.
    race: O2SzOE7WUO7EtyqW
    background: 4WczKmyfq45RvBOz
    originalClass: B4RcR568GHtvVVaP
    xp:
      value: 0
    appearance: >-
      Vaelwyn is a winter eladrin. She's very blue and graceful looking, though
      shorter than most elves. Her most striking features are her cornflower
      blue skin and ocean blue irises that seem to glow from the black sclera of
      her eyes that mark her as cursed by the Wild Hunt.
    trait: >-
      Inquisitive. Everything is new, but I have a thirst to learn.

      I don't talk about the thing that torments me. I'd rather not burden
      others with my curse or dwell on it myself.

      I'm driven by a wanderlust that (would have) led me away from home.
