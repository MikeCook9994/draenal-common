      advancement:
        vUCslJiBg5QGrJ2Q:
          type: ScaleValue
          title: Fear Die
          _id: vUCslJiBg5QGrJ2Q
          configuration:
            identifier: ''
            type: dice
            distance:
              units: ''
            scale:
              '0':
                number: 1
