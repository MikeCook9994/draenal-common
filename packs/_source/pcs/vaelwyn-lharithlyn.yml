      advancement: {}
      description:
        value: >-
          <p>As a Bonus Action or when you roll initiative, you can spend one
          use of your wild shape to assume the form of the nightmare. You gain
          the benefits below for 10 minutes or until you end them (no action
          required).</p><p><strong>Aura of Fear.</strong> You exude an aura of
          fear in a 10-foot Emanation originating from you. You may designate
          creatures to be unaffected by it when it appears. Any other creature
          must make a Wisdom saving throw whenever the Emanation enters a
          creature's space and whenever a creature enters the Emanation's space
          or ends its turn in there. On a failed save, you gain a fear die and
          the creature has the Frightened condition until the end of its next
          turn. Additionally, you can target an unseen creature in the Emanation
          with <em>Nightmarish Torment</em>.</p><p><strong>Druidic
          Violence.</strong> You can use your Wisdom modifier instead of
          Strength or Dexterity for the attack and damage rolls of attacks using
          melee weapons.</p><p><strong>Shrouded in Shadow.</strong> You gain
          temporary hit points equal to the total of any Fear Dice that you
          roll.</p>
