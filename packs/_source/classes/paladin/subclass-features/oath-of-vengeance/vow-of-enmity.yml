  description:
    value: >-
      <div class="ddb"><p>When you take the Attack action, you can expend one
      use of your Channel Divinity to utter a vow of enmity against a creature
      you can see within 30 feet of yourself. You have Advantage on attack rolls
      against the creature for 1 minute or until you use this feature
      again.</p><p>If the creature drops to 0 Hit Points before the vow ends,
      you can transfer the vow to a different creature within 30 feet of
      yourself (no action required).</p></div>
