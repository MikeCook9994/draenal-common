  description:
    value: >-
      <p>As a Bonus Action, you gain the benefits below for 10 minutes or until
      you end them (no action required). Once you use this feature, you can't
      use it again until you finish a Long Rest. You can also restore your use
      of it by expending a level 5 spell slot (no action
      required).</p><p><em><strong>Flight.</strong></em> You sprout spectral
      wings on your back, have a Fly Speed of 60 feet, and can
      hover.</p><p><em><strong>Frightful Aura.</strong></em> Whenever an enemy
      starts its turn in your Aura of Protection, that creature must succeed on
      a Wisdom saving throw or have the Frightened condition for 1 minute or
      until it takes any damage. Attack rolls against the Frightened creature
      have Advantage.</p>
