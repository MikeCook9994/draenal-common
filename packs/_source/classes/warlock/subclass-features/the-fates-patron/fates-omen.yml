  description:
    value: >-
      <p>Through the fates that grant you your magic, your curses bestow harken
      the sign of ill omens for your enemies. You gain the following
      benefits.</p><p><strong>Effortless Agony.</strong> You always have the
      @UUID[Compendium.dnd5e.spells24.Item.phbsplHex0000000]{Hex} spell
      prepared. You can cast it without expending a spell slot and without the
      need for concentration. Casting the spell in this way casts it at the
      level of your Pact Magic spell slots. Once you use this feature, you can't
      use it again until you complete a Short or Long Rest or you use your
      Magical Cunning feature.</p><p><strong>Bonus Damage.</strong> Your damage
      rolls against creatures cursed by you gain a 1d6 damage
      bonus.</p><p><strong>Improved Critical.</strong> Any attack roll you make
      against a creature cursed by you is a critical hit on a roll of a 19 or 20
      on the d20.</p><p><strong>Soul Siphon.</strong> If a creature cursed by
      you dies, you regain hit points equal to your warlock level + your
      Charisma modifier (minimum of 1 hit point). The hit points you gain cannot
      exceed the perished creature's maximum hit points.</p>
