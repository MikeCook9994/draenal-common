  description:
    value: "<p>You can curse the soul of a creature you slay, temporarily binding it to your service. When a creature with a challenge rating greater than 0 within 60 feet of you that you can see dies, you can cause its spirit to rise from its corpse as a specter (no action required). It manifests in the space the creature occupied when it died and uses the <em>Accursed Specter</em> stat block below.</p><p>The specter is an ally to you and your allies and obeys your commands. It vanishes if you die.</p><p><em><strong>The Specter in Combat.</strong></em> In combat, the specter acts during your turn. It can move and use its Reaction on its own, but the only action it takes is the Dodge action unless you take a Bonus Action to command it to take an action in its stat block or some other action. You can also sacrifice one of your attacks when you take the Attack action to command the specter to take either the Life Drain or Horrific Visage action. If you have the Incapacitated condition, the specter acts on its own and isn't limited to the Dodge action.</p><div class=\"ddb\"><section id=\"secret-CWrb191EYHxQqByn\" class=\"secret\"><p></p><div class=\"stat-block\"><h5 id=\"accursed-specter\" class=\"compendium-hr quick-menu-exclude\">Accursed Specter</h5><p>Medium Undead, Neutral</p><p><strong>AC</strong> 12 plus your Charisma modifier</p><p><strong>HP</strong> 5 plus five times your Warlock level (the specter has a number of Hit Dice [d8s] equal to your Warlock level)</p><p><strong>Speed</strong> 30 ft., Fly 50 ft. (Hover)</p><div class=\"stats\"><table class=\"physical abilities-saves\"><thead><tr><th><p>\_</p></th><th><p>\_</p></th><th><p>Mod</p></th><th><p>Save</p></th></tr></thead><tbody><tr><th><p>STR</p></th><td><p>1</p></td><td><p>-5</p></td><td><p>-5</p></td></tr><tr><th><p>DEX</p></th><td><p>14</p></td><td><p>+2</p></td><td><p>+2</p></td></tr><tr><th><p>CON</p></th><td><p>10</p></td><td><p>+0</p></td><td><p>+0</p></td></tr></tbody></table><table class=\"mental abilities-saves\"><thead><tr><th><p>\_</p></th><th><p>\_</p></th><th><p>Mod</p></th><th><p>Save</p></th></tr></thead><tbody><tr><th><p>INT</p></th><td><p>12</p></td><td><p>+1</p></td><td><p>+1</p></td></tr><tr><th><p>WIS</p></th><td><p>12</p></td><td><p>+1</p></td><td><p>+1</p></td></tr><tr><th><p>CHA</p></th><td><p>16</p></td><td><p>+3</p></td><td><p>+3</p></td></tr></tbody></table></div><p><strong>Resistances</strong> Acid, Bludgeoning, Cold, Fire, Lightning, Piercing, Slashing, Thunder</p><p><strong>Immunities</strong> Necrotic, Poison; Charmed, Exhausion, Grappled, Paralyzed, Petrified, Poisoned, Prone, Restrained, Unconscious</p><p><strong>Senses</strong> &amp;Reference[darkvision]{Darkvision} 60 ft.; Passive &amp;Reference[prc]{Perception} 11</p><p><strong>Languages</strong> Understands Common plus one other language determined by the DM but can't speak</p><p><strong>CR</strong> None (XP 0; PB equals your Proficiency Bonus)</p><p class=\"monster-header\">Traits</p><p><em><strong>Incorporeal Movement.</strong></em> The specter can move through other creatures and objects as if they were Difficult Terrain. It takes 1d10 Force damage if it ends its turn inside an object.</p><p><em><strong>Cursed Bond.</strong></em> Add your Proficiency Bonus to any ability check or saving throw the beast makes.</p><p class=\"monster-header\">Actions</p><p><em><strong>Life Drain.</strong></em> <em>Melee Attack Roll:</em> Bonus equals your spell attack modifier, reach 5 ft. <em>Hit:</em> 2d6 + 3 plus your Charisma modifier Necrotic damage. If the target is a creature, you regain hit points equal to half of the damage.</p><p><em><strong>Horrific Visage.</strong></em> <em>Wisdom Saving Throw:</em> Your spell save DC, one creature that the specter can see within 30 feet. <em>Failure:</em> The target has the Frightened condition until the end of the specter's next turn. <em>Success:</em> The target is immune to this specter's Horrifying Visage for 24 hours.</p><p class=\"monster-header\">Bonus Actions</p><p><em><strong>Shadow Stealth.</strong></em> While in Dim Light or Darkness, the specter takes the Hide action.</p><p class=\"monster-header\">Reactions</p><p><em><strong>Bitter Delivery.</strong></em> <em>Trigger:</em> You cast a spell that has a range of touch while the specter is within 120 feet of you. <em>Response:</em> The specter delivers the spell through its touch.</p></div><p></p></section></div>"
