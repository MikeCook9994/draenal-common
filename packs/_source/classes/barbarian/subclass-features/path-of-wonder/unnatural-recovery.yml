  description:
    value: >-
      <p>The magic suffusing your body exacerbates the speed of your recovery.
      You gain the following benefits.</p><p><strong>Rage Healing.</strong>
      While your Rage is active, you regain hit points equal to your Rage Damage
      bonus whenever you deal damage with a Strength-based
      attack.</p><p><strong>Vital Uptake.</strong> You have pool of d12s that
      you can use to mend your wounds in times of calm. The number of dice in
      the pools is equal to the number shown for your Barbarian level in the
      Rages column of the Barbarian features table.</p><p>After you complete a
      Short Rest, you can expend any number of these dice to heal yourself. Roll
      the dice you expend, and restore a number of Hit Points equal to the
      roll's total plus a bonus equal to your Constitution bonus times the
      number of expended dice. Your pool regains all expended dice when you
      finish a Long Rest.</p>
