  description:
    value: >-
      <p>You've developed techniques to use your spells in combat at your own
      risk. While you are raging, you gain the following
      benefits.</p><p><strong>Close Quarter Spellcraft.</strong> Being within 5
      feet of a creature doesn't impose disadvantage on your ranged spell attack
      rolls.</p><p><strong>Danger Close.</strong> If you must make a saving
      throw against an area of effect spell that you cast, other creatures have
      disadvantage on Saving Throws they must make against that same spell.</p>
