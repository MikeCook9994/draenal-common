  description:
    value: >-
      <p>You are a practiced magus and martial in combat. When take a Magic
      action to cast a Sorcerer spell while you are raging, you gain the
      following benefits.</p><p><strong>Spell fury.</strong> You can add your
      Rage bonus to one damage roll of the spell.</p><p><strong>Follow
      up.</strong> You can immediately make one melee attack with a weapon as a
      bonus action.</p>
