  description:
    value: >-
      <p>Your intrinsic bond with the weave has given you the ability to
      exchange a fraction of your life essence to manifest arcane effects, known
      to others as "spells", into the world. See chapter 7 of the 2024 Player's
      Handbook for the rules on spellcasting. The information below details how
      you use those rules as a Path of Wonder
      Barbarian.</p><p><strong>Cantrips.</strong> You know two cantrips of your
      choice from the Sorcerer spell list. Whenever you gain a Barbarian level,
      you can replace one of these cantrips with another cantrip of your choice
      from the Sorcerer spell list. When you reach Barbarian level 10, you learn
      another Sorcerer cantrip of your choice.</p><p><strong>Spell
      Slots.</strong> When you take the Magic action to cast a spell, you create
      a spell slot by expending a number of your Barbarian Hit Point Dice equal
      to the spell's level. Immediately after the casting of the spell, roll the
      expended Hit Point Dice, then take force damage equal to the value rolled.
      This damage cannot be reduced in any way. If a spell or feature prevents
      the casting of the spell, this spell slot is lost; however, the hit dice
      are not expended.</p><p>The maximum spell slot level you can create is
      shown in the Maximum Spell Slot Level column of the Path of Wonder
      Spellcasting table below.</p><table><caption>Path of Wonder
      Spellcasting</caption><thead><tr><th>Barbarian Level</th><th>Spells
      Prepared</th><th>Maximum Spell Slot
      Level</th></tr></thead><tbody><tr><td><p
