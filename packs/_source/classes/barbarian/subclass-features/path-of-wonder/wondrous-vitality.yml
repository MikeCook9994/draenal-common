      style="text-align:center">3</p></td></tr><tr><td><p
      style="text-align:center">18</p></td><td><p
      style="text-align:center">11</p></td><td><p
      style="text-align:center">3</p></td></tr><tr><td><p
      style="text-align:center">19</p></td><td><p
      style="text-align:center">12</p></td><td><p
      style="text-align:center">4</p></td></tr><tr><td><p
      style="text-align:center">20</p></td><td><p
      style="text-align:center">13</p></td><td><p
      style="text-align:center">4</p></td></tr></tbody></table><p><strong>Prepared
      Spells of Level 1+.</strong> You prepare the list of level 1+ spells that
      are available for you to cast with this feature. To start, choose three
      level 1 spells from the Sorcerer spell list. The number of spells on your
      list increases as you gain Barbarian levels, as shown in the Spells
      Prepared column of the Path of Wonder Spellcasting table. Whenever that
      number increases, choose additional spells from the Sorcerer spell list
      until the number of spells on your list matches the number on the table.
      The chosen spells must be of a level for which you can create a spell
      slot. For example, if you're a level 7 Barbarian, your list of prepared
      spells can include 5 Sorcerer spells of levels 1 and 2 in any
      combination.</p><p><strong>Changing Your Prepared Spells.</strong>
      Whenever you gain a Barbarian level, you can replace one spell on your
      list with another Sorcerer spell for which you can create spell slots
      for.</p><p><strong>Spellcasting Ability.</strong> Strength is your
      spellcasting ability for your Sorcerer spells.</p><p><strong>Spellcasting
      Focus.</strong> You can use any martial melee weapon as a Spellcasting
      Focus for your Sorcerer spells.</p>
