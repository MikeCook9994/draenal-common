  description:
    value: >-
      <p>When you cast
      @UUID[Compendium.dnd5e.spells24.Item.phbsplShillelagh]{Shillelagh},
      you can choose to expend a use of your wild shape to enhance the spell's
      casting. When you do so, the spell gains the following benefits.
      </p><p><em><strong>Increased Duration.</strong></em> The spell's duration
      increases to 10 minutes and it does not end if you drop the weapon.
      </p><p><em><strong>Spellcasting Focus. </strong></em>The weapon counts as
      a spellcasting focus for you. </p><p><em><strong>Extra
      Effect.</strong></em> If an attack you make with the weapon deals damage
      or a creature takes damage from or fails a saving throw forced by a spell
      you cast that used the weapon as a spellcasting focus, you can cause one
      of the following additional effects.</p><p>  <strong>Coincidental
      Curses.</strong> You can curse the target with Reaper's Mark.</p><p> 
      <strong>Biological Incursion.</strong> The target suffers additional
      damage equal to the level of your Reaper's Mark on them. You choose the
      damage type from the following list: fire, necrotic, poison, or
      psychic.</p>
