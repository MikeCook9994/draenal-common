  description:
    value: >-
      <p>The Anguish delivered by your nightmares has become inescapable. You
      gain the following benefits.</p><p><strong>Creeping Shadows.</strong> Your
      <em>Aura of Fear</em> is now a 30-foot
      Emanation.</p><p><strong>Nightmare's End.</strong> Any attack roll you
      make against a creature within your <em>Aura of Fear</em> is a critical
      hit on a roll of a 19 or 20 on the d20. Additionally, when you score a
      critical hit against a creature, you can immediately use <em>Nightmarish
      Torment.</em> as part of the attack.</p>
