  description:
    value: >-
      <p>When you cast <em>Dream</em> and choose to make the make the messenger
      terrifying to the target, you can implant a seed of anguish within the
      target that lasts for 7 days or until your harvest the seed. When a target
      with an implanted seed of anguish makes a saving throw against your
      <em>Aura of Fear</em>, you can harvest the seed. The target automatically
      fails the saving throw and you gain a number of Fear Dice equal to your
      wisdom modifier. The Frightened condition applied in this way ignores
      immunity to the condition.</p><p>You can have only one creature under the
      effect of this feature at a time. You can choose to remove an implanted
      seed of anguish at any time (no action required).</p>
