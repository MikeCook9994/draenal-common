  description:
    value: >-
      <p>You feed off the fear of your enemies and amass it within yourself.
      This amassed fear is represented as your Fear Dice, which are d8s. You
      gain a Fear Die whenever a creature with a challenge rating greater than 0
      is hit by an attack that you make or fails a saving throw against a spell
      that you cast. When you score a critical hit, you gain an additional Fear
      Die from that attack. Your current number of Fear Dice cannot exceed your
      Druid Level. You lose any remaining Fear Dice when you complete a Long
      Rest.</p><p>You expend these Fear Dice to fuel the options
      below.</p><p><strong>Sudden Uncertainty.</strong> When a creature within
      30 feet of you succeeds on an ability check or saving throw, you can take
      a Reaction to expend one Fear Die; roll the Fear Die and subtract the
      number rolled from the creature's roll, potentially turning the success
      into a failure. You can use this feature a number of times equal to your
      Wisdom modifier. You regain any expended uses after a Long
      Rest.</p><p><strong>Painful Accessory.</strong> Once per turn when you hit
      a creature with an attack with a weapon, you can expend up to two Fear
      Dice to deal additional cold, fire, necrotic, poison, or psychic damage
      (your choice) damage equal to the total rolls of the expended Fear
      Dice.</p><p><strong>Nightmarish Torment.</strong> As an Action, you can
      expend your Fear Dice to torment a creature within 30 feet of you that you
      can see. The maximum number of Fear Dice that you can expend at once is
      equal to your Wisdom Modifier. Roll the expended Fear Dice. The target
      suffers cold, fire, necrotic, poison, or psychic damage (your choice)
      equal to the total and is subjected to one of the effects of your choice
      listed below.</p><p><em>Restraint.</em> The target must make a Dexterity
      saving throw against your spell Save DC. On a failed save, the target is
      Restrained until the start of your next turn.</p><p><em>Ignorance.</em>
      The target must make a Wisdom saving throw against your spell Save DC. On
      a failed save, the target is Blinded and Deafened until the start of your
      next turn. This effect applies to all types of
      sight.</p><p><em>Contamination.</em> The target must make a Constitution
      saving throw against your spell Save DC. On a failed save, the target is
      poisoned until the start of your next turn.</p>
