  description:
    value: >-
      <p>You have sowed the seeds of the nightmare, and the time has come to
      reap the harvest. As an action, each creature of your choice within 60
      feet of you has your Reaper's Mark violently removed. Each target suffers
      1d8 damage for each level of the curse that was removed. You choose the
      damage type from the following list: fire, necrotic, poison, or psychic.
      Then choose one from one of the following effects. </p><p> 
      <strong>Reap.</strong> You can restore hit points equal to the damage
      dealt, divided as you choose among any number of creatures of your choice
      that you can see within 60 feet of you.</p><p>  <strong>Sow.</strong>
      Choose any number of creatures within 60 feet of you that you can see and
      were not targeted by the previous effect of this action. You can apply a
      number of Reaper's Mark curses equal to the total level of Reaper's Mark
      curses you removed as part of this action, divided evenly among the chosen
      creatures.</p><p>Once you use this action, you can't use it again until
      you finish a Short Rest unless you spend a spell slot of 5th level or
      higher (no action required) to restore your use of it. </p>
