  description:
    value: >-
      <p>Starting at 10th level, you can use the hidden, magical pathways that
      some fey use to traverse space in the blink of an eye. As a bonus action
      on your turn, you can teleport up to 60 feet to an unoccupied space you
      can see. Alternatively, you can use your action to teleport one willing
      creature you touch up to 30 feet to an unoccupied space you can
      see.</p><p>You can use this feature a number of times equal to your Wisdom
      modifier (minimum of once), and you regain all expended uses of it when
      you finish a long rest.</p>
