  description:
    value: >-
      <p>Druids who are members of the Circle of Dreams hail from regions that
      have strong ties to the Feywild and its dreamlike realms. The druids'
      guardianship of the natural world makes for a natural alliance between
      them and good-aligned fey. These druids seek to fill the world with dreamy
      wonder. Their magic mends wounds and brings joy to downcast hearts, and
      the realms they protect are gleaming, fruitful places, where dream and
      reality blur together and where the weary can find rest.</p>
