  description:
    value: >-
      <div class="ddb"><h1>Background: Rewarded</h1><p></p><p><strong>Ability
      Scores:</strong> Intelligence, Wisdom, Charisma<br><strong>Feat:</strong>
      Skilled<br><strong>Skill Proficiencies:</strong>
      &amp;Reference[ath]{Insight} and
      &amp;Reference[prc]{Persuasion}<br><strong>Tool Proficiency:</strong>
      <em>Choose one kind of Gaming Set</em><br><strong>Equipment:</strong>
      <em>Choose A or B:</em> (A) a bottle of black ink, an ink pen, Parchment
      (5 sheets), a gaming set (same as above), a signet ring, Fine Clothes, a
      Pouch, 18 gp; or (B) 50 GP</p><p>You were living a difficult life before
      your destiny suddenly changed through a miraculous turn of good fortune.
      Perhaps a benevolent deity gave you precisely what you most desired. You
      might have stumbled across a Deck of Many Things and drawn a card with a
      potent, positive effect. Or maybe you inherited a modest fortune from a
      distant relative you didn't know you had.</p></div><p>Regardless, you left
      the daily miseries of your old life behind in favor of a life of adventure
      and excitement. Your old debts have been paid, responsibilities you
      thought inescapable are behind you, or you suddenly possess rare and
      unusual skills unknown to ordinary folk.</p><div class="ddb"><h2>Feat:
      Skilled</h2></div>
