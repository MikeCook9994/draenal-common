  description:
    value: >-
      <p>You gain the following benefits.</p><p><strong>Ability Score
      Increase.</strong> Increase your Strength, Dexterity, or Wisdom score by
      1, to a maximum of 20.</p><p><strong>Mounted Strike.</strong> While
      mounted, you have Advantage on attack rolls against any unmounted creature
      within 5 feet of your mount that is at least one size smaller than the
      mount.</p><p><strong>Leap Aside.</strong> If your mount is subjected to an
      effect that allows it to make a Dexterity saving throw to take only half
      damage, it instead takes no damage if it succeeds on the saving throw and
      only half damage if it fails. For your mount to gain this benefit, you
      must be riding it, and neither of you can have the Incapacitated
      condition.</p><p><strong>Veer.</strong> While mounted, you can force an
      attack that hits your mount to hit you instead if you don't have the
      Incapacitated condition.</p>
