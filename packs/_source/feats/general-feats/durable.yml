    value: >-
      <p>You gain the following benefits.</p><p><strong>Ability Score
      Increase.</strong> Increase your Constitution score by 1, to a maximum of
      20.</p><p><strong>Defy Death.</strong> You have Advantage on Death Saving
      Throws.</p><p><strong>Speedy Recovery.</strong> As a Bonus Action, you can
