  description:
    value: >-
      <p>You gain the following benefits.</p><p><strong>Ability Score
      Increase.</strong> Increase your Intelligence, Wisdom, or Charisma score
      by 1, to a maximum of 20.</p><p><strong>Cantrip.</strong> You learn the
      @UUID[Compendium.dnd5e.spells24.Item.phbsplRayofFrost]{Ray of Frost}
      cantrip. If you already know it, you learn a different Wizard cantrip of
      your choice. The spell's spellcasting ability is the ability increased by
      this feat.</p><p><strong>Frostbite.</strong> Once per turn when you hit a
      creature with an attack roll and deal Cold damage, you can temporarily
      negate the creature's defenses. The creature subtracts 1d4 from the next
      saving throw it makes before the end of your next turn.</p>
