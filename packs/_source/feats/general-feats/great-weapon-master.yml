  description:
    value: >-
      <p>You gain the following benefits.</p><p><strong>Ability Score
      Increase.</strong> Increase your Strength score by 1, to a maximum of
      20.</p><p><strong>Heavy Weapon Mastery.</strong> When you hit a creature
      with a weapon that has the Heavy property as part of the Attack action on
      your turn, you can cause the weapon to deal extra damage to the target.
      The extra damage equals your Proficiency
      Bonus.</p><p><strong>Hew.</strong> Immediately after you score a Critical
      Hit with a Melee weapon or reduce a creature to 0 Hit Points with one, you
      can make one attack with the same weapon as a Bonus Action.</p>
