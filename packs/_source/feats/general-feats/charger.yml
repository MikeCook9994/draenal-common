  description:
    value: >-
      <p>You gain the following benefits.</p><p><span
      style="box-sizing:inherit;-webkit-tap-highlight-color:transparent;outline:0px;font-weight:bold"><strong>Ability
      Score Increase.</strong></span> Increase your Strength or Dexterity score
      by 1, to a maximum of 20.</p><p><span
      style="box-sizing:inherit;-webkit-tap-highlight-color:transparent;outline:0px;font-weight:bold"><strong>Improved
      Dash.</strong></span> When you take the Dash action, your Speed increases
      by 10 feet for that action.</p><p><span
      style="box-sizing:inherit;-webkit-tap-highlight-color:transparent;outline:0px;font-weight:bold"><strong>Charge
      Attack.</strong></span> If you move at least 10 feet in a straight line
      toward a target immediately before hitting it with a melee attack roll as
      part of the Attack action, choose one of the following effects: gain a 1d8
      bonus to the attack's damage roll, or push the target up to 10 feet away
      if it is no more than one size larger than you. You can use this benefit
      only once on each of your turns.</p>
