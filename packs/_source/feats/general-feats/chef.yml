  description:
    value: >-
      <p>You gain the following benefits.</p><p><strong>Ability Score
      Increase.</strong> Increase your Constitution or Wisdom score by 1, to a
      maximum of 20.</p><p><strong>Cook's Utensils.</strong> You gain
      proficiency with Cook's Utensils if you don't already have
      it.</p><p><strong>Replenishing Meal.</strong> As part of a Short Rest, you
      can cook special food if you have ingredients and Cook's Utensils on hand.
      You can prepare enough of this food for a number of creatures equal to 4
      plus your Proficiency Bonus. At the end of the Short Rest, any creature
      who eats the food and spends one or more Hit Dice to regain Hit Points
      regains an extra 1d8 Hit Points.</p><p><strong>Bolstering Treats.</strong>
      With 1 hour of work or when you finish a Long Rest, you can cook a number
      of treats equal to your Proficiency Bonus if you have ingredients and
      Cook's Utensils on hand. These special treats last 8 hours after being
      made. A creature can use a Bonus Action to eat one of those treats to gain
      a number of Temporary Hit Points equal to your Proficiency
      Bonus.</p><section id="secret-akE6DePqCkdg5alg" class="secret"><p>The
      "[[lookup @name activity=Gy2l7hayYJEPsUk6]]" activity will add a [[/item
      Compendium.draenal-common.feats.Item.08crIqwEW6FGV2sM]] to your inventory.
      You will need to manually set the item quantity to the number of treats
      that you make (currently 4+@prof). This will automatically be removed
      after 8 hours.</p></section>
    chat: ''
