  description:
    value: >-
      <p>You call forth a Fey spirit. It manifests in an unoccupied space that
      you can see within range and uses the <strong>Fey Spirit</strong> stat
      block. When you cast the spell, choose a mood: Fuming, Mirthful, or
      Tricksy. The creature resembles a Fey creature of your choice marked by
      the chosen mood, which determines certain details in its stat block. The
      creature disappears when it drops to 0 Hit Points or when the spell
      ends.The creature is an ally to you and your allies. In combat, the
      creature shares your Initiative count, but it takes its turn immediately
      after yours. It obeys your verbal commands (no action required by you). If
      you don't issue any, it takes the Dodge action and uses its movement to
      avoid danger.</p><p><strong>Using a Higher-Level Spell Slot. </strong>Use
      the spell slot's level for the spell's level in the stat
      block.</p><p>#TODO: Add stat block</p>
