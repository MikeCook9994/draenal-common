  description:
    value: >-
      <p>You call forth spirits of the dead, which flit around you for the
      spell's duration. The spirits are intangible and invulnerable.</p><p>Until
      the spell ends, any attack you make deals 1d8 extra damage when you hit a
      creature within 10 feet of you. This damage is radiant, necrotic, or cold
      (your choice when you cast the spell). Any creature that takes this damage
      can't regain hit points until the start of your next turn.</p><p>In
      addition, any creature of your choice that you can see that starts its
      turn within 10 feet of you has its speed reduced by 10 feet until the
      start of your next turn.</p><p><strong>At Higher Levels.</strong> When you
      cast this spell using a spell slot of 4th level or higher, the damage
      increases by 1d8 for every two slot levels above 3rd.</p>
