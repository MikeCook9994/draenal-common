  description:
    value: >-
      <div class="ddb"><p>The target hit by the attack roll takes an extra 5d10
      Force damage from the attack. If the attack reduces the target to 50 Hit
      Points or fewer, the target must succeed on a [[/save cha format=long]] or
      be transported to a harmless demiplane for the duration. While there, the
      target has the Incapacitated condition. When the spell ends, the target
      reappears in the space it left or in the nearest unoccupied space if that
      space is occupied.</p></div>
