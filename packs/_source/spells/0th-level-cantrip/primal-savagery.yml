  description:
    value: >-
      <p>You channel primal magic to cause your teeth or fingernails to sharpen,
      ready to deliver a corrosive attack. Make a melee spell attack against one
      creature within 5 feet of you. On a hit, the target takes 1d10 acid
      damage. After you make the attack, your teeth or fingernails return to
      normal.</p><p><strong>Cantrip Upgrade.</strong> The spell's damage
      increases by 1d10 when you reach levels 5 (2d10), 11 (3d10), and 17
      (4d10).</p>
