  description:
    value: >-
      <div class="ddb"><p>Protective magical frost surrounds you. You gain 5
      Temporary Hit Points. If a creature hits you with a melee attack roll
      before the spell ends, the creature takes 5 Cold damage. The spell ends
      early if you have no Temporary Hit Points.</p><p><strong>Using a
      Higher-Level Spell Slot.</strong> The Temporary Hit Points and the Cold
      damage both increase by 5 for each spell slot level above 1.</p></div>
