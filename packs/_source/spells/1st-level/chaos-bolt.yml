  description:
    value: >-
      <p>You hurl an undulating, warbling mass of chaotic energy at one creature
      in range. Make a ranged spell attack against the target. On a hit, the
      target takes 2d8 + 1d6 damage. Choose one of the d8s. The number rolled on
      that die determines the attack's damage type, as shown
      below.</p><table><thead><tr><th><p>d8</p></th><th><p>Damage
      Type</p></th></tr></thead><tbody><tr><td><p
      style="text-align:center">1</p></td><td><p
      style="text-align:center">Acid</p></td></tr><tr><td><p
      style="text-align:center">2</p></td><td><p
      style="text-align:center">Cold</p></td></tr><tr><td><p
      style="text-align:center">3</p></td><td><p
      style="text-align:center">Fire</p></td></tr><tr><td><p
      style="text-align:center">4</p></td><td><p
      style="text-align:center">Force</p></td></tr><tr><td><p
      style="text-align:center">5</p></td><td><p
      style="text-align:center">Lightning</p></td></tr><tr><td><p
      style="text-align:center">6</p></td><td><p
      style="text-align:center">Poison</p></td></tr><tr><td><p
      style="text-align:center">7</p></td><td><p
      style="text-align:center">Psychic</p></td></tr><tr><td><p
      style="text-align:center">8</p></td><td><p
      style="text-align:center">Thunder</p></td></tr></tbody></table><p>If you
      roll the same number on both d8s, the chaotic energy leaps from the target
      to a different creature of your choice within 30 feet of it. Make a new
      attack roll against the new target, and make a new damage roll, which
      could cause the chaotic energy to leap again.A creature can be targeted
      only once by each casting of this spell.</p><p><strong>At Higher
      Levels.</strong> When you cast this spell using a spell slot of 2nd level
      or higher, each target takes 1d6 extra damage of the type rolled for each
      slot level above 1st.</p>
