  description:
    value: >-
      <p>You tap into your life force to assail your enemies. Choose to expend
      one or two of your unexpended Hit Point Dice. For each expended Hit Point
      Die, make one attack with the weapon used in the spell's casting. The
      attack does additional force damage equal to one roll of your Hit Point
      Die and its reach is 30 feet greater than normal as the target is assailed
      with arcane force. If the attack hits, you take force damage equal to
      result of each Hit Point Die roll.</p>
