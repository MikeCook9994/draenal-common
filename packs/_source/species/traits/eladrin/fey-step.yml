  description:
    value: >-
      <div class="ddb"><p>As a bonus action, you can magically teleport up to 30
      feet to an unoccupied space you can see. You can use this trait a number
      of times equal to your proficiency bonus, and you regain all expended uses
      when you finish a long rest.</p><p>When you reach 3rd level, your Fey Step
      gains an additional effect based on your season; if the effect requires a
      saving throw, the DC equals 8 + your proficiency bonus + your
      Intelligence, Wisdom, or Charisma modifier (choose when you select this
      race):</p><p><strong>Autumn.</strong> Immediately after you use your Fey
      Step, up to two creatures of your choice that you can see within 10 feet
      of you must succeed on a [[/save wis format=long]] or be charmed by you
      for 1 minute, or until you or your companions deal any damage to the
      creatures.</p><p><strong>Winter.</strong> When you use your Fey Step, one
      creature of your choice that you can see within 5 feet of you before you
      teleport must succeed on a [[/save wis format=long]] or be frightened of
      you until the end of your next turn.</p><p><strong>Spring.</strong> When
      you use your Fey Step, you can touch one willing creature within 5 feet of
      you. That creature then teleports instead of you, appearing in an
      unoccupied space of your choice that you can see within 30 feet of
      you.</p><p><strong>Summer.</strong> Immediately after you use your Fey
      Step, each creature of your choice that you can see within 5 feet of you
      takes fire damage equal to your proficiency bonus.</p></div>
