  description:
    value: >-
      <p>A proper disguise goes beyond the face and mannerisms. Changlings must
      adapt the skills and vocations of those that they are attempting to
      impersonate. Starting at character level 3, while you are shape-shifted
      with your Shape-Shifter trait, you gain proficiency in one skill or tool
      of your choice. You instead gain Expertise in the chosen tool or skill if
      you already proficient.</p>
