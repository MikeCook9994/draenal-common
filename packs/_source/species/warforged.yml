  description:
    value: >-
      <div class="ddb"><p>Warforged are mechanical beings built as weapons to
      fight in the Last War.</p><p><span style="font-family:'Roboto
      Condensed'"><strong>Warforged Traits</strong></span></p><p><span
      style="font-family:'Roboto Condensed'">Construct Resilience, Integrated
      Protection, Sentry's Rest, Specialized Design,
      Tireless</span></p><p><strong>Creature Type</strong></p><p>You're a
      Construct.</p><p><strong>Size</strong></p><p>Your Size is Medium (about
      6–8 feet tall) or Small (about 3–4 feet tall), chosen when you select this
      species.</p><p><strong>Speed</strong></p><p>Your Speed is 30
      feet.</p><p><strong>Languages</strong></p><p>Your character knows at least
      three languages: Common plus two languages you roll or choose from the
      Standard Languages table. Knowledge of a language means your character can
      communicate in it, read it, and write it. Your class and other features
      might also give you languages.</p><p>The Standard Languages table lists
      languages that are widespread on D&amp;D worlds. Every player character
      knows Common, which originated in the planar metropolis of Sigil, the hub
      of the multiverse. The other standard languages originated with the first
      members of the most prominent species in the worlds of D&amp;D and have
      since spread widely.</p><table
      style="--sb-table-row-bg-hover:#b3d3df;--sb-table-row-bg-dark:#d7e8ee;--sb-table-row-bg-light:#f1f7f9;--dark-sb-table-row-bg-light:#5e7982;--dark-sb-table-row-bg-dark:#5c7f8c;--dark-sb-table-row-bg-hover:#78a2b0"
      class="table-compendium table--generic-dice"><caption><p><strong>Standard
      Languages</strong></p></caption><thead><tr><th><p>1d12</p></th><th><p>Language</p></th><th><p>Origin</p></th></tr></thead><tbody><tr><td><p>—</p></td><td><p>Common</p></td><td><p>Sigil</p></td></tr><tr><td><p>1</p></td><td><p>Common
      Sign
      Language</p></td><td><p>Sigil</p></td></tr><tr><td><p>2</p></td><td><p>Draconic</p></td><td><p>Dragons</p></td></tr><tr><td><p>3-4</p></td><td><p>Dwarvish</p></td><td><p>Dwarves</p></td></tr><tr><td><p>5-6</p></td><td><p>Elvish</p></td><td><p>Elves</p></td></tr><tr><td><p>7</p></td><td><p>Giant</p></td><td><p>Giants</p></td></tr><tr><td><p>8</p></td><td><p>Gnomish</p></td><td><p>Gnomes</p></td></tr><tr><td><p>9</p></td><td><p>Goblin</p></td><td><p>Goblinoids</p></td></tr><tr><td><p>10-11</p></td><td><p>Halfling</p></td><td><p>Halflings</p></td></tr><tr><td><p>12</p></td><td><p>Orc</p></td><td><p>Orcs</p></td></tr></tbody></table><p><strong>Construct
      Resilience</strong></p><p>You have Resistance to Poison damage.You also
      have Advantage on saving throws to avoid or end the Poisoned
      condition.</p><p><strong>Integrated Protection</strong></p><p>You gain a
      +1 bonus to your Armor Class. In addition, armor you have donned can't be
      removed against your will while you're alive.</p><p><strong>Sentry's
      Rest</strong></p><p>You don't need to sleep, and magic can't put you to
      sleep. You can finish a Long Rest in 6 hours if you spend those hours in
      an inactive, motionless state. During this time, you appear inert but
      remain conscious.</p><p><strong>Specialized Design</strong></p><p>You gain
      one skill proficiency and one tool proficiency of your
      choice.</p><p><strong>Tireless</strong></p><p>You don't gain Exhaustion
      levels from dehydration, malnutrition, or suffocation.</p></div>
